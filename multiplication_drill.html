<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>かけ算ドリル</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0f0e17; --card:#22213a;
  --accent:#ff6b35; --accent2:#f7c59f;
  --correct:#4ecdc4; --wrong:#ff4757;
  --text:#fffffe; --muted:#a7a9be; --border:#2e2d4a;
}
html, body {
  height:100%; background:var(--bg); color:var(--text);
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:auto;
}
.screen { display:none; width:100%; max-width:480px; padding:20px; flex-direction:column; align-items:center; }
.screen.active { display:flex; }

/* ===== START ===== */
.logo {
  font-size:52px; font-weight:900; letter-spacing:-2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.logo-sub { font-size:13px; color:var(--muted); letter-spacing:4px; margin-bottom:36px; }
.info-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 20px; width:100%; margin-bottom:12px; }
.info-title { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
.tags { display:flex; gap:8px; flex-wrap:wrap; }
.tag { background:var(--accent); color:#fff; font-size:12px; font-weight:700; padding:4px 10px; border-radius:20px; }
.tag.s { background:transparent; border:1px solid var(--border); color:var(--muted); }
.start-btn {
  margin-top:28px; width:100%; padding:18px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border:none; border-radius:14px; color:#fff;
  font-size:19px; font-weight:800; letter-spacing:2px; cursor:pointer;
  box-shadow:0 8px 28px rgba(255,107,53,.4);
}

/* ===== DRILL ===== */
#drill { justify-content:space-between; min-height:100svh; padding:16px 20px 24px; }

.top-bar { width:100%; display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.score-badge { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:5px 11px; font-size:13px; font-weight:700; color:var(--correct); white-space:nowrap; }
.prog-wrap { flex:1; }
.prog-bg { height:5px; background:var(--border); border-radius:3px; overflow:auto; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:width .3s; }
.prog-text { font-size:10px; color:var(--muted); text-align:center; margin-top:3px; }
.timer { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:5px 11px; font-size:19px; font-weight:800; color:var(--accent2); font-variant-numeric:tabular-nums; min-width:66px; text-align:center; }

/* 問題エリア */
.q-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
.q-label { font-size:10px; letter-spacing:3px; color:var(--muted); }
.q-row { display:flex; align-items:center; gap:10px; }
.q-num { font-size:62px; font-weight:900; line-height:1; }
.q-op  { font-size:40px; color:var(--accent); font-weight:300; }
.q-eq  { font-size:40px; color:var(--muted); font-weight:300; }

/* 答え表示 */
.answer-box {
  min-width:96px; min-height:72px;
  display:flex; align-items:center; justify-content:center;
  background:#1a1929; border:2px solid var(--border);
  border-radius:12px; font-size:50px; font-weight:900;
  color:var(--accent2); transition:border-color .15s, color .15s;
  letter-spacing:-1px;
}
.answer-box.has  { border-color:var(--accent); }
.answer-box.ok   { border-color:var(--correct); color:var(--correct); }
.answer-box.ng   { border-color:var(--wrong);   color:var(--wrong); }

.feedback { font-size:17px; font-weight:700; height:24px; text-align:center; }
.feedback.ok { color:var(--correct); }
.feedback.ng { color:var(--wrong); }

/* ===== テンキー ===== */
.pad-section { width:100%; }
.pad-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:8px;
}
.pad-key {
  aspect-ratio:1.2;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:26px;
  font-weight:700;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .08s, background .1s;
  user-select:none;
}
.pad-key:active { transform:scale(.92); background:#2e2d4a; }
.pad-key.zero { grid-column:2; }
.pad-key.del  { background:transparent; border-color:var(--border); color:var(--muted); font-size:22px; }

.bottom-row { display:grid; grid-template-columns:1fr 2fr; gap:8px; }
.btn-skip {
  padding:15px; background:var(--card); border:1px solid var(--border);
  border-radius:12px; color:var(--muted); font-size:14px; font-weight:700;
  cursor:pointer; transition:transform .08s;
}
.btn-skip:active { transform:scale(.95); }
.btn-ok {
  padding:15px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border:none; border-radius:12px; color:#fff;
  font-size:17px; font-weight:800; letter-spacing:1px;
  cursor:pointer; box-shadow:0 4px 14px rgba(255,107,53,.35);
  transition:transform .08s;
}
.btn-ok:active { transform:scale(.96); }
.btn-ok:disabled { opacity:.45; box-shadow:none; }

/* ===== NAME INPUT ===== */
.name-wrap { width:100%; margin-bottom:4px; }
.name-label { font-size:11px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; display:block; }
.name-input {
  width:100%; padding:14px 16px; background:var(--card);
  border:2px solid var(--border); border-radius:12px;
  color:var(--text); font-size:18px; font-weight:600;
  outline:none; transition:border-color .2s;
}
.name-input:focus { border-color:var(--accent); }
.name-input::placeholder { color:var(--muted); font-weight:400; }

/* ===== RESULT ===== */
#result { justify-content:center; gap:16px; }
.result-title {
  font-size:34px; font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
/* スタンプカード */
.stamp-card {
  width:100%; background:var(--card); border:2px solid var(--accent);
  border-radius:14px; padding:16px 20px;
  display:flex; flex-direction:column; gap:6px;
}
.stamp-name { font-size:20px; font-weight:800; color:var(--text); }
.stamp-meta { font-size:12px; color:var(--muted); }

/* グレードバッジ */
.grade-wrap {
  width:100%; display:flex; align-items:center; gap:16px;
  background:var(--card); border:2px solid var(--border);
  border-radius:14px; padding:14px 20px;
}
.grade-badge { font-size:64px; font-weight:900; line-height:1; min-width:72px; text-align:center; }
.grade-S { color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,.5); }
.grade-A { color:#4ecdc4; text-shadow:0 0 20px rgba(78,205,196,.4); }
.grade-B { color:#58a6ff; text-shadow:0 0 20px rgba(88,166,255,.4); }
.grade-C { color:#a7a9be; }
.grade-D { color:#ff4757; }
.grade-info { display:flex; flex-direction:column; gap:4px; }
.grade-cond { font-size:12px; color:var(--muted); line-height:1.5; }
.res-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.res-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
.res-label { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
.res-val { font-size:36px; font-weight:900; color:var(--accent2); }
.res-unit { font-size:13px; color:var(--muted); margin-left:3px; }
.wrong-title { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; align-self:flex-start; }
.wrong-list { width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; max-height:160px; overflow-y:auto; display:flex; flex-wrap:wrap; gap:7px; }
.wrong-item { background:rgba(255,71,87,.15); border:1px solid rgba(255,71,87,.3); border-radius:7px; padding:5px 10px; font-size:13px; color:var(--wrong); font-weight:600; }
.retry-btn {
  width:100%; padding:16px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border:none; border-radius:13px; color:#fff;
  font-size:17px; font-weight:800; letter-spacing:2px; cursor:pointer;
  box-shadow:0 6px 20px rgba(255,107,53,.4);
}

@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }
.pop { animation:pop .18s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.shake { animation:shake .25s ease; }
</style>
</head>
<body>

<!-- START -->
<div class="screen active" id="start">
  <div class="logo">×ドリル</div>
  <div class="logo-sub">Multiplication Drill</div>
  <div class="info-card">
    <div class="info-title">出題範囲（全100問）</div>
    <div class="tags">
      <span class="tag">九九 81問</span>
      <span class="tag">10の段 10問</span>
      <span class="tag">平方数 9問</span>
    </div>
  </div>
  <div class="info-card">
    <div class="info-title">詳細</div>
    <div class="tags">
      <span class="tag s">1×1〜9×9</span>
      <span class="tag s">10×1〜10×10</span>
      <span class="tag s">11²〜19²</span>
    </div>
  </div>
  <div class="name-wrap">
    <label class="name-label">名前を入力してください</label>
    <input class="name-input" id="name-input" type="text" placeholder="例：山田 太郎" maxlength="20" oninput="checkName()">
  </div>
  <button class="start-btn" id="start-btn" onclick="startDrill()" disabled>名前を入力してください</button>
</div>

<!-- DRILL -->
<div class="screen" id="drill">
  <div class="top-bar">
    <div class="score-badge" id="score">○ 0</div>
    <div class="prog-wrap">
      <div class="prog-bg"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="prog-text" id="prog-text">1 / 100</div>
    </div>
    <div class="timer" id="timer">0.0</div>
  </div>

  <div class="q-area">
    <div class="q-label" id="q-label">QUESTION 1</div>
    <div class="q-row">
      <span class="q-num" id="qa">—</span>
      <span class="q-op">×</span>
      <span class="q-num" id="qb">—</span>
      <span class="q-eq">=</span>
      <div class="answer-box" id="ans-box">?</div>
    </div>
    <div class="feedback" id="fb"></div>
  </div>

  <div class="pad-section">
    <div class="pad-grid">
      <button class="pad-key" onclick="padPress(7)">7</button>
      <button class="pad-key" onclick="padPress(8)">8</button>
      <button class="pad-key" onclick="padPress(9)">9</button>
      <button class="pad-key" onclick="padPress(4)">4</button>
      <button class="pad-key" onclick="padPress(5)">5</button>
      <button class="pad-key" onclick="padPress(6)">6</button>
      <button class="pad-key" onclick="padPress(1)">1</button>
      <button class="pad-key" onclick="padPress(2)">2</button>
      <button class="pad-key" onclick="padPress(3)">3</button>
      <button class="pad-key zero" onclick="padPress(0)">0</button>
      <button class="pad-key del" onclick="padDel()">⌫</button>
    </div>
    <div class="bottom-row">
      <button class="btn-skip" onclick="skipQ()">スキップ</button>
      <button class="btn-ok" id="ok-btn" onclick="submitAnswer()">決定 ✓</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-title">結果発表！</div>
  <div class="grade-wrap" id="grade-wrap">
    <div class="grade-badge" id="grade-badge">—</div>
    <div class="grade-info">
      <div class="stamp-name" id="stamp-name">—</div>
      <div class="stamp-meta" id="stamp-meta">—</div>
      <div class="grade-cond" id="grade-cond">—</div>
    </div>
  </div>
  <div class="res-grid">
    <div class="res-card"><div class="res-label">正解数</div><div class="res-val" id="r-correct">—</div></div>
    <div class="res-card"><div class="res-label">タイム</div><div class="res-val" id="r-time">—</div></div>
    <div class="res-card"><div class="res-label">正答率</div><div class="res-val" id="r-rate">—</div></div>
    <div class="res-card"><div class="res-label">1問平均</div><div class="res-val" id="r-avg">—</div></div>
  </div>
  <div class="wrong-title" id="wrong-title"></div>
  <div class="wrong-list" id="wrong-list"></div>
  <button class="retry-btn" onclick="showScreen('start')">もう一度チャレンジ →</button>
</div>

<script>
// ── 名前チェック ──────────────────────────────
function checkName(){
  const btn=document.getElementById('start-btn');
  const ok=document.getElementById('name-input').value.trim()!=='';
  btn.disabled=!ok;
  btn.textContent=ok?'はじめる →':'名前を入力してください';
}

// ── 問題プール ──────────────────────────────
function buildPool(){
  const p=[];
  for(let a=1;a<=9;a++) for(let b=1;b<=9;b++) p.push([a,b]); // 81
  for(let b=1;b<=10;b++) p.push([10,b]);                      // 10
  for(let a=11;a<=19;a++) p.push([a,a]);                      // 9
  return p; // 100
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── 状態 ──────────────────────────────────
let questions=[], idx=0, correct=0, wrongs=[];
let timerID=null, t0=0, totalSec=0;
let answered=false, inputStr='';

// ── テンキー ──────────────────────────────
function padPress(n){
  if(answered) return;
  if(inputStr.length>=3) return; // 最大3桁
  inputStr += String(n);
  updateAnsBox();
}
function padDel(){
  if(answered) return;
  inputStr=inputStr.slice(0,-1);
  updateAnsBox();
}
function updateAnsBox(){
  const box=document.getElementById('ans-box');
  if(inputStr===''){
    box.textContent='?'; box.className='answer-box';
  } else {
    box.textContent=inputStr; box.className='answer-box has';
  }
}

// ── キーボード対応（PC用） ─────────────────
document.addEventListener('keydown', e=>{
  if(document.getElementById('drill').classList.contains('active')){
    if(e.key>='0'&&e.key<='9') padPress(Number(e.key));
    else if(e.key==='Backspace') padDel();
    else if(e.key==='Enter') submitAnswer();
  }
});

// ── ドリル制御 ────────────────────────────
function startDrill(){
  questions=shuffle(buildPool());
  idx=0; correct=0; wrongs=[]; answered=false; inputStr='';
  showScreen('drill');
  showQ(0);
  updateScore();
  t0=Date.now();
  timerID=setInterval(()=>{
    document.getElementById('timer').textContent=((Date.now()-t0)/1000).toFixed(1);
  },100);
}

function showQ(i){
  const[a,b]=questions[i];
  document.getElementById('q-label').textContent=`QUESTION ${i+1}`;
  document.getElementById('qa').textContent=a;
  document.getElementById('qb').textContent=b;
  document.getElementById('prog').style.width=`${(i/100)*100}%`;
  document.getElementById('prog-text').textContent=`${i+1} / 100`;
  document.getElementById('ans-box').textContent='?';
  document.getElementById('ans-box').className='answer-box';
  document.getElementById('fb').textContent='';
  document.getElementById('fb').className='feedback';
  document.getElementById('ok-btn').disabled=false;
  answered=false; inputStr='';
}

function correctAns(){ const[a,b]=questions[idx]; return a*b; }

function updateScore(){
  const el=document.getElementById('score');
  el.textContent=`○ ${correct}`;
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

function submitAnswer(){
  if(answered) return;
  if(inputStr===''){setFB('答えを入力してください','ng',false);return;}
  const userAns=parseInt(inputStr,10);
  const ans=correctAns();
  answered=true;
  document.getElementById('ok-btn').disabled=true;
  const box=document.getElementById('ans-box');
  if(userAns===ans){
    correct++;
    box.className='answer-box ok';
    setFB('✓ 正解！','ok',false);
    updateScore();
    setTimeout(nextQ, 800);
  } else {
    const[a,b]=questions[idx];
    wrongs.push({q:`${a}×${b}`,ans,user:userAns});
    box.className='answer-box ng';
    box.classList.add('shake');
    setFB(`✗ 正解は ${ans}`,'ng',false);
    setTimeout(nextQ,1500);
  }
}

function skipQ(){
  if(answered) return;
  const[a,b]=questions[idx];
  wrongs.push({q:`${a}×${b}`,ans:correctAns(),user:'－'});
  nextQ();
}

function nextQ(){
  idx++;
  if(idx>=100){
    clearInterval(timerID);
    totalSec=(Date.now()-t0)/1000;
    showResults();
  } else { showQ(idx); }
}

function setFB(msg,cls,auto){
  const el=document.getElementById('fb');
  el.textContent=msg; el.className=`feedback ${cls}`;
  if(auto) setTimeout(()=>{el.textContent='';},1800);
}

function calcGrade(correct, sec){
  if(correct===100 && sec<=240) return {g:'S', color:'grade-S', cond:'全問正解 かつ 240秒以内'};
  if(correct===100 && sec<=360) return {g:'A', color:'grade-A', cond:'全問正解 かつ 360秒以内'};
  if(correct>=95  && sec<=420) return {g:'B', color:'grade-B', cond:'95問以上正解 かつ 420秒以内'};
  if(correct>=90  && sec<=600) return {g:'C', color:'grade-C', cond:'90問以上正解 かつ 600秒以内'};
  return {g:'D', color:'grade-D', cond:'次回またチャレンジ！'};
}

function showResults(){
  showScreen('result');
  // グレード
  const grade = calcGrade(correct, totalSec);
  const badge = document.getElementById('grade-badge');
  badge.textContent = grade.g;
  badge.className = `grade-badge ${grade.color}`;
  document.getElementById('grade-cond').textContent = grade.cond;
  // スタンプ：名前・日時
  const name = document.getElementById('name-input').value.trim() || '（名前なし）';
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('stamp-name').textContent = name;
  document.getElementById('stamp-meta').textContent = `かけ算ドリル　${dateStr}　${timeStr}`;
  document.getElementById('r-correct').innerHTML=`${correct}<span class="res-unit">問</span>`;
  document.getElementById('r-time').innerHTML=`${totalSec.toFixed(1)}<span class="res-unit">秒</span>`;
  document.getElementById('r-rate').innerHTML=`${correct}<span class="res-unit">%</span>`;
  document.getElementById('r-avg').innerHTML=`${(totalSec/100).toFixed(1)}<span class="res-unit">秒</span>`;
  const wl=document.getElementById('wrong-list');
  const wt=document.getElementById('wrong-title');
  wl.innerHTML='';
  if(wrongs.length){
    wt.textContent=`間違えた問題（${wrongs.length}問）`;
    wrongs.forEach(w=>{
      const el=document.createElement('div');
      el.className='wrong-item';
      el.textContent=`${w.q}＝${w.ans}`;
      wl.appendChild(el);
    });
  } else {
    wt.textContent='全問正解！🎉';
    wl.style.display='none';
  }
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
