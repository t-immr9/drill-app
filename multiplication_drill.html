<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>かけ算ドリル BOSS版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0f0e17; --card:#22213a;
  --accent:#ff6b35; --accent2:#f7c59f;
  --correct:#4ecdc4; --wrong:#ff4757;
  --text:#fffffe; --muted:#a7a9be; --border:#2e2d4a;
  --boss-bg:#1a0a0a; --boss-card:#2e1515;
  --shintenno-bg:#0a0a1a;
}
html,body {
  height:100%; background:var(--bg); color:var(--text);
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  overflow:auto; transition:background 0.6s;
}
body.boss-mode      { background:var(--boss-bg); }
body.shintenno-mode { background:var(--shintenno-bg); }

.screen { display:none; width:100%; max-width:480px; padding:20px; flex-direction:column; align-items:center; }
.screen.active { display:flex; }
#start { min-height:100svh; justify-content:center; padding:24px 20px; }
#drill { min-height:100svh; justify-content:space-between; padding:16px 20px 24px; }
#result { justify-content:center; min-height:100svh; padding:20px; gap:14px; }

/* ===== START ===== */
.logo {
  font-size:52px; font-weight:900; letter-spacing:-2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.logo-sub { font-size:13px; color:var(--muted); letter-spacing:4px; margin-bottom:20px; }

.name-date-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:14px 20px; width:100%; margin-bottom:14px;
  display:flex; flex-direction:column; gap:10px;
}
.date-display { font-size:12px; color:var(--muted); letter-spacing:2px; text-align:right; }
.name-row { display:flex; align-items:center; gap:10px; }
.name-label-s { font-size:12px; color:var(--muted); white-space:nowrap; letter-spacing:1px; }
.name-input {
  flex:1; background:#1a1929; border:1.5px solid var(--border); border-radius:9px;
  color:var(--text); font-size:16px; font-weight:700; padding:8px 12px;
  outline:none; transition:border-color 0.2s;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
}
.name-input:focus { border-color:var(--accent); }
.name-input::placeholder { color:var(--muted); font-weight:400; font-size:14px; }

/* コース選択 */
.course-label { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; align-self:flex-start; margin-bottom:8px; }
.course-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; margin-bottom:14px; }
.course-btn {
  padding:16px 8px; background:var(--card); border:2px solid var(--border);
  border-radius:14px; color:var(--text); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  transition:border-color .15s, background .15s;
}
.course-btn .c-icon  { font-size:26px; }
.course-btn .c-name  { font-size:16px; font-weight:900; }
.course-btn .c-desc  { font-size:10px; color:var(--muted); text-align:center; line-height:1.4; }
.course-btn.selected { border-color:var(--accent); background:rgba(255,107,53,.1); }
.course-btn.selected .c-name { color:var(--accent); }

.info-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 18px; width:100%; margin-bottom:10px; }
.info-title { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
.tags { display:flex; gap:7px; flex-wrap:wrap; }
.tag   { background:var(--accent); color:#fff; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
.tag.s { background:transparent; border:1px solid var(--border); color:var(--muted); }
.tag.boss      { background:linear-gradient(135deg,#ff2255,#ff6600); color:#fff; }
.tag.shintenno { background:linear-gradient(135deg,#aa44ff,#ff2255); color:#fff; }

.start-btn {
  margin-top:8px; width:100%; padding:18px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border:none; border-radius:14px; color:#fff;
  font-size:19px; font-weight:800; letter-spacing:2px; cursor:pointer;
  box-shadow:0 8px 28px rgba(255,107,53,.4); transition:opacity .2s;
}
.start-btn:disabled { opacity:.4; cursor:default; box-shadow:none; }

/* ===== DRILL ===== */
.top-bar { width:100%; display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.score-badge {
  background:var(--card); border:1px solid var(--border); border-radius:9px;
  padding:5px 11px; font-size:13px; font-weight:700; color:var(--correct); white-space:nowrap;
  transition:background 0.4s, border-color 0.4s;
}
body.boss-mode .score-badge      { background:var(--boss-card); border-color:#5a1a2a; }
body.shintenno-mode .score-badge { background:#1a1a2e; border-color:#441166; }
.prog-wrap { flex:1; }
.prog-bg { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:width .3s; }
body.boss-mode .prog-fill      { background:linear-gradient(90deg,#ff2255,#ff6600); }
body.shintenno-mode .prog-fill { background:linear-gradient(90deg,#aa44ff,#ff2255); }
.prog-text { font-size:10px; color:var(--muted); text-align:center; margin-top:3px; }
.timer {
  background:var(--card); border:1px solid var(--border); border-radius:9px;
  padding:5px 11px; font-size:19px; font-weight:800; color:var(--accent2);
  font-variant-numeric:tabular-nums; min-width:66px; text-align:center;
  transition:background 0.4s;
}
body.boss-mode .timer      { background:var(--boss-card); border-color:#5a1a2a; color:#ff9040; }
body.shintenno-mode .timer { background:#1a1a2e; border-color:#441166; color:#cc88ff; }
.btn-retire {
  background:transparent; border:1px solid rgba(255,71,87,.35);
  border-radius:9px; color:rgba(255,71,87,.6); font-size:12px; font-weight:700;
  padding:5px 10px; cursor:pointer; white-space:nowrap;
}

#boss-banner {
  display:none; width:100%; text-align:center;
  padding:8px 0 5px; font-size:14px; font-weight:900; letter-spacing:3px;
  border-radius:10px; margin-bottom:6px;
  animation: bossFlash .5s ease infinite alternate;
}
#boss-banner.boss      { display:block; background:rgba(255,34,85,.15); color:#ff2255; border:1px solid rgba(255,34,85,.4); }
#boss-banner.shintenno { display:block; background:rgba(170,68,255,.15); color:#cc88ff; border:1px solid rgba(170,68,255,.4); }
@keyframes bossFlash { from{opacity:.6} to{opacity:1} }

.q-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; position:relative; }
.q-label { font-size:10px; letter-spacing:3px; color:var(--muted); }
.q-row { display:flex; align-items:center; gap:10px; }
.q-num { font-size:62px; font-weight:900; line-height:1; transition:color 0.4s; }
.q-num.two-digit { font-size:48px; }
body.boss-mode .q-num      { color:#ff9040; }
body.shintenno-mode .q-num { color:#cc88ff; }
.q-op { font-size:40px; color:var(--accent); font-weight:300; }
body.boss-mode .q-op      { color:#ff2255; }
body.shintenno-mode .q-op { color:#aa44ff; }
.q-eq { font-size:40px; color:var(--muted); font-weight:300; }
.answer-box {
  min-width:96px; min-height:72px; display:flex; align-items:center; justify-content:center;
  background:#1a1929; border:2px solid var(--border); border-radius:12px;
  font-size:50px; font-weight:900; color:var(--accent2);
  transition:border-color .15s, color .15s, background 0.4s;
}
body.boss-mode .answer-box      { background:#1a0d0d; border-color:#5a1a1a; color:#ff9040; }
body.shintenno-mode .answer-box { background:#0d0d1a; border-color:#330066; color:#cc88ff; }
.answer-box.has { border-color:var(--accent); }
.answer-box.ok  { border-color:var(--correct); color:var(--correct); }
.answer-box.ng  { border-color:var(--wrong);   color:var(--wrong); }
.feedback { font-size:17px; font-weight:700; height:24px; text-align:center; }
.feedback.ok { color:var(--correct); }
.feedback.ng { color:var(--wrong); }

#sekiban-btn {
  display:none; position:absolute; top:0; right:0;
  background:linear-gradient(135deg,#3a2a10,#5a4020);
  border:1px solid #8a6030; border-radius:8px;
  color:#f0c060; font-size:11px; font-weight:700; letter-spacing:1px;
  padding:5px 9px; cursor:pointer;
  animation: sekibanGlow 2s ease infinite alternate;
}
#sekiban-btn.visible { display:block; }
@keyframes sekibanGlow { from{box-shadow:0 2px 8px rgba(240,192,96,.2)} to{box-shadow:0 2px 16px rgba(240,192,96,.5)} }

.pad-section { width:100%; }
.pad-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px; }
.pad-key {
  aspect-ratio:1.2; background:var(--card); border:1px solid var(--border);
  border-radius:12px; color:var(--text); font-size:26px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform .08s, background .1s; user-select:none;
}
body.boss-mode .pad-key      { background:var(--boss-card); border-color:#5a1a2a; }
body.shintenno-mode .pad-key { background:#1a1a2e; border-color:#441166; }
.pad-key:active { transform:scale(.92); background:#2e2d4a; }
.pad-key.zero { grid-column:2; }
.pad-key.del  { background:transparent; border-color:var(--border); color:var(--muted); font-size:22px; }
.bottom-row { display:grid; grid-template-columns:1fr 2fr; gap:8px; }
.btn-skip {
  padding:15px; background:var(--card); border:1px solid var(--border);
  border-radius:12px; color:var(--muted); font-size:14px; font-weight:700; cursor:pointer;
}
.btn-ok {
  padding:15px; background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border:none; border-radius:12px; color:#fff;
  font-size:17px; font-weight:800; letter-spacing:1px;
  cursor:pointer; box-shadow:0 4px 14px rgba(255,107,53,.35);
  transition:background 0.4s;
}
body.boss-mode .btn-ok      { background:linear-gradient(135deg,#ff2255,#ff6600); }
body.shintenno-mode .btn-ok { background:linear-gradient(135deg,#aa44ff,#ff2255); }
.btn-ok:disabled { opacity:.45; box-shadow:none; }

/* ===== RESULT ===== */
.result-title {
  font-size:34px; font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.grade-wrap {
  width:100%; display:flex; align-items:center; gap:16px;
  background:var(--card); border:2px solid var(--border);
  border-radius:14px; padding:14px 20px;
}
.grade-badge { font-size:64px; font-weight:900; line-height:1; min-width:72px; text-align:center; }
.grade-S { color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,.5); }
.grade-A { color:#4ecdc4; text-shadow:0 0 20px rgba(78,205,196,.4); }
.grade-B { color:#58a6ff; text-shadow:0 0 20px rgba(88,166,255,.4); }
.grade-C { color:#a7a9be; }
.grade-D { color:#ff4757; }
.grade-info { display:flex; flex-direction:column; gap:3px; }
.stamp-name { font-size:18px; font-weight:800; color:var(--text); }
.stamp-meta { font-size:11px; color:var(--muted); }
.grade-cond { font-size:11px; color:var(--muted); line-height:1.5; }
.title-card {
  display:none; width:100%; padding:14px 20px; border-radius:14px; text-align:center;
  background:linear-gradient(135deg,rgba(170,68,255,.2),rgba(255,34,85,.2));
  border:1px solid rgba(170,68,255,.5);
}
.title-card.show { display:block; }
.title-label { font-size:10px; letter-spacing:3px; color:#aa88cc; margin-bottom:4px; }
.title-name  { font-size:22px; font-weight:900; color:#cc88ff; letter-spacing:2px; }
.res-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.res-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
.res-label { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
.res-val  { font-size:36px; font-weight:900; color:var(--accent2); }
.res-unit { font-size:13px; color:var(--muted); margin-left:3px; }
.wrong-title { font-size:12px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; align-self:flex-start; }
.wrong-list { width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; max-height:140px; overflow-y:auto; display:flex; flex-wrap:wrap; gap:7px; }
.wrong-item { background:rgba(255,71,87,.15); border:1px solid rgba(255,71,87,.3); border-radius:7px; padding:5px 10px; font-size:13px; color:var(--wrong); font-weight:600; }
.retry-btn {
  width:100%; padding:16px; background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border:none; border-radius:13px; color:#fff; font-size:17px; font-weight:800;
  letter-spacing:2px; cursor:pointer; box-shadow:0 6px 20px rgba(255,107,53,.4);
}

/* ===== アニメーション ===== */
@keyframes pop   { 0%{transform:scale(1)} 40%{transform:scale(1.22)} 100%{transform:scale(1)} }
.pop { animation:pop .18s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.shake { animation:shake .25s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes bossAppear {
  0%  { transform:scale(.5) rotate(-5deg); opacity:0; }
  60% { transform:scale(1.15) rotate(2deg); opacity:1; }
  80% { transform:scale(.95) rotate(-1deg); }
  100%{ transform:scale(1) rotate(0); opacity:1; }
}
@keyframes bossTextShake {
  0%,100%{transform:translate(0,0)} 20%{transform:translate(-3px,1px)}
  40%{transform:translate(3px,-1px)} 60%{transform:translate(-2px,2px)} 80%{transform:translate(2px,-2px)}
}
#boss-intro {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0); align-items:center; justify-content:center;
  flex-direction:column; gap:12px; pointer-events:none;
}
#boss-intro.show { display:flex; }
.boss-intro-text {
  font-size:32px; font-weight:900; letter-spacing:4px; text-align:center;
  animation: bossAppear .5s ease forwards, bossTextShake .3s ease .5s 3;
}
.boss-intro-text.boss      { color:#ff2255; text-shadow:0 0 20px rgba(255,34,85,.8); }
.boss-intro-text.shintenno { color:#aa44ff; text-shadow:0 0 30px rgba(170,68,255,.9); }
.boss-intro-sub { font-size:14px; color:var(--muted); letter-spacing:3px; opacity:0; animation:fadeIn .3s ease .8s forwards; }
.confetti-piece {
  position:fixed; top:-10px; z-index:300; border-radius:2px;
  animation:confettiFall linear forwards; pointer-events:none;
}
@keyframes confettiFall {
  0%  { transform:translateY(0) rotate(0deg) scale(1); opacity:1; }
  80% { opacity:1; }
  100%{ transform:translateY(100vh) rotate(720deg) scale(.5); opacity:0; }
}
#title-popup { display:none; position:fixed; inset:0; z-index:250; align-items:center; justify-content:center; pointer-events:none; }
#title-popup.show { display:flex; }
.title-popup-inner {
  font-size:28px; font-weight:900; color:#cc88ff;
  text-shadow:0 0 30px rgba(170,68,255,.8);
  letter-spacing:3px; text-align:center;
  animation:titlePop 2s ease forwards;
}
@keyframes titlePop {
  0%  { transform:scale(0); opacity:0; }
  20% { transform:scale(1.2); opacity:1; }
  40% { transform:scale(1); }
  70% { transform:scale(1); opacity:1; }
  100%{ transform:scale(.8) translateY(-40px); opacity:0; }
}
#sekiban-overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.75); align-items:center; justify-content:center; flex-direction:column;
}
#sekiban-overlay.show { display:flex; animation:fadeIn .3s ease; }
.sekiban-stone {
  background:linear-gradient(135deg,#2a1e0a,#3d2e12); border:2px solid #8a6030;
  border-radius:16px; padding:24px 28px; max-width:340px; width:90%;
  box-shadow:0 0 40px rgba(240,192,96,.3);
}
.sekiban-title { font-size:16px; font-weight:900; color:#f0c060; letter-spacing:3px; text-align:center; margin-bottom:14px; border-bottom:1px solid rgba(240,192,96,.3); padding-bottom:10px; }
.sekiban-list { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.sekiban-item { background:rgba(240,192,96,.1); border:1px solid rgba(240,192,96,.25); border-radius:8px; padding:7px 4px; text-align:center; }
.sekiban-item .sq-base { font-size:11px; color:#a08040; }
.sekiban-item .sq-ans  { font-size:18px; font-weight:900; color:#f0c060; }
.sekiban-penalty { font-size:11px; color:#ff6060; text-align:center; padding-top:8px; border-top:1px solid rgba(255,96,96,.2); }
#retire-overlay { display:none; position:fixed; inset:0; z-index:150; background:rgba(0,0,0,.8); align-items:center; justify-content:center; }
#retire-overlay.show { display:flex; animation:fadeIn .2s ease; }
.retire-dialog { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px 24px; max-width:300px; width:88%; text-align:center; }
.retire-dialog h3 { font-size:18px; font-weight:900; color:var(--wrong); margin-bottom:8px; }
.retire-dialog p  { font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.6; }
.retire-btns   { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.retire-cancel { padding:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; color:var(--muted); font-size:14px; font-weight:700; cursor:pointer; }
.retire-ok     { padding:12px; background:var(--wrong); border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<!-- オーバーレイ類 -->
<div id="retire-overlay">
  <div class="retire-dialog">
    <h3>⚠️ リタイア</h3>
    <p>途中でやめてトップに戻ります。<br>記録は保存されません。</p>
    <div class="retire-btns">
      <button class="retire-cancel" onclick="closeRetire()">続ける</button>
      <button class="retire-ok"     onclick="doRetire()">リタイア</button>
    </div>
  </div>
</div>
<div id="boss-intro">
  <div class="boss-intro-text" id="boss-intro-text">⚔️ BOSS APPEARED!</div>
  <div class="boss-intro-sub"  id="boss-intro-sub">平方数との戦いが始まる…</div>
</div>
<div id="title-popup">
  <div class="title-popup-inner" id="title-popup-text">🏆 称号獲得！</div>
</div>
<div id="sekiban-overlay" onclick="closeSekiban()">
  <div class="sekiban-stone" onclick="event.stopPropagation()">
    <div class="sekiban-title">📜 古の石板</div>
    <div class="sekiban-list" id="sekiban-list"></div>
    <div class="sekiban-penalty">⚠ 石板を見ると獲得スコアが半減されます</div>
  </div>
</div>

<!-- START -->
<div class="screen active" id="start">
  <div class="logo">×ドリル</div>
  <div class="logo-sub">BOSS EDITION</div>

  <div class="name-date-card">
    <div class="date-display" id="date-display">—</div>
    <div class="name-row">
      <span class="name-label-s">氏名</span>
      <input class="name-input" id="name-input" type="text" placeholder="名前を入力してください" maxlength="20" oninput="checkReady()">
    </div>
  </div>

  <div class="course-label">コースを選択</div>
  <div class="course-grid">
    <button class="course-btn" data-course="10"  onclick="selectCourse(this)">
      <span class="c-icon">⚡</span>
      <span class="c-name">10問</span>
      <span class="c-desc">九九8問<br>中ボス2問</span>
    </button>
    <button class="course-btn" data-course="30"  onclick="selectCourse(this)">
      <span class="c-icon">⚔️</span>
      <span class="c-name">30問</span>
      <span class="c-desc">九九24問<br>中ボス4問<br>四天王2問</span>
    </button>
    <button class="course-btn" data-course="100" onclick="selectCourse(this)">
      <span class="c-icon">👑</span>
      <span class="c-name">100問</span>
      <span class="c-desc">九九91問<br>中ボス5問<br>四天王4問</span>
    </button>
  </div>

  <div class="info-card" id="course-info" style="display:none">
    <div class="info-title" id="course-info-title">出題構成</div>
    <div class="tags" id="course-info-tags"></div>
  </div>
  <div class="info-card">
    <div class="info-title">ボスシステム</div>
    <div class="tags">
      <span class="tag s">📜 石板でヒント（スコア半減）</span>
      <span class="tag s">🎊 四天王撃破で称号獲得</span>

<script>
// ── 日付 ──────────────────────────────────────
function formatDate(d){
  const w=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w[d.getDay()]}）`;
}
function formatDateTime(d){
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  return `${formatDate(d)} ${hh}:${mm}`;
}
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('date-display').textContent=formatDate(new Date());
});

// ── 石板ヒント ────────────────────────────────
const SQUARE_HINTS=[
  {base:11,ans:121},{base:12,ans:144},{base:13,ans:169},
  {base:14,ans:196},{base:15,ans:225},{base:16,ans:256},
  {base:17,ans:289},{base:18,ans:324},{base:19,ans:361}
];

// ── コース定義 ────────────────────────────────
// 各コースの出題構成・グレード基準を一元管理
const COURSES = {
  10: {
    total: 10,
    label: '10問コース',
    // 1-indexed で type を返す
    getType: (pos) => {
      if(pos===5||pos===10) return 'boss'; // 中ボス（11〜15）
      return 'normal';
    },
    // bossは11〜15、shintennoなし
    bossRange:      [11,15],
    shintennoRange: null,
    // grade: {全問正解秒, 全問正解秒, 正解閾値, 秒, 正解閾値, 秒}
    grade: { sTime:30, aTime:36, bCorrect:9, bTime:42, cCorrect:9, cTime:60 },
    infoTags: [
      {cls:'',     txt:'九九 8問'},
      {cls:'boss', txt:'5・10問目：中ボス（11²〜15²）'},
    ]
  },
  30: {
    total: 30,
    label: '30問コース',
    getType: (pos) => {
      if(pos===25||pos===30) return 'shintenno'; // 四天王（16〜19）
      if(pos===5||pos===10||pos===15||pos===20) return 'boss'; // 中ボス（11〜15）
      return 'normal';
    },
    bossRange:      [11,15],
    shintennoRange: [16,19],
    grade: { sTime:72, aTime:108, bCorrect:28, bTime:126, cCorrect:27, cTime:180 },
    infoTags: [
      {cls:'',          txt:'九九 24問'},
      {cls:'boss',      txt:'5・10・15・20問目：中ボス（11²〜15²）'},
      {cls:'shintenno', txt:'25・30問目：四天王（16²〜19²）'},
    ]
  },
  100: {
    total: 100,
    label: '100問コース',
    getType: null, // buildPool100で生成
    bossRange:      [11,15],
    shintennoRange: [16,19],
    grade: { sTime:240, aTime:360, bCorrect:95, bTime:420, cCorrect:90, cTime:600 },
    infoTags: [
      {cls:'',          txt:'九九 81問'},
      {cls:'',          txt:'10の段 10問'},
      {cls:'boss',      txt:'中ボス 5問（11²〜15²）'},
      {cls:'shintenno', txt:'四天王 4問（16²〜19²）'},
    ]
  }
};

// ── ユーティリティ ────────────────────────────
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function pickUniq(min,max,count){
  const pool=[];for(let i=min;i<=max;i++)pool.push(i);
  shuffle(pool);return pool.slice(0,count);
}

// ── 問題生成 ──────────────────────────────────
function buildQuestions(courseKey){
  const c=COURSES[courseKey];
  if(String(courseKey)==='100') return buildPool100();

  const total=c.total;
  // 通常問題（九九）のプールを作る
  const normalPool=[];
  for(let a=1;a<=9;a++) for(let b=1;b<=9;b++) normalPool.push({type:'normal',a,b});
  shuffle(normalPool);

  // boss・shintenno の使用済みチェック用
  const usedBoss={};
  const usedShintenno={};

  const qs=[];
  let normalIdx=0;
  for(let pos=1;pos<=total;pos++){
    const type=c.getType(pos);
    if(type==='shintenno'){
      // 16〜19からユニークに1問
      let n;
      do{ n=randInt(c.shintennoRange[0],c.shintennoRange[1]); }while(usedShintenno[n]&&Object.keys(usedShintenno).length<4);
      usedShintenno[n]=true;
      qs.push({type:'shintenno',a:n,b:n});
    } else if(type==='boss'){
      // 11〜15からユニークに1問
      let n;
      do{ n=randInt(c.bossRange[0],c.bossRange[1]); }while(usedBoss[n]&&Object.keys(usedBoss).length<5);
      usedBoss[n]=true;
      qs.push({type:'boss',a:n,b:n});
    } else {
      qs.push(normalPool[normalIdx++]||{type:'normal',a:randInt(1,9),b:randInt(1,9)});
    }
  }
  return qs;
}

function buildPool100(){
  const p=[];
  for(let a=1;a<=9;a++) for(let b=1;b<=9;b++) p.push({type:'normal',a,b});
  for(let b=1;b<=10;b++) p.push({type:'normal',a:10,b});
  for(let a=11;a<=15;a++) p.push({type:'boss',a,b:a});
  for(let a=16;a<=19;a++) p.push({type:'shintenno',a,b:a});
  return shuffle(p);
}

// ── グレード判定 ──────────────────────────────
function calcGrade(correctFloat, sec, courseKey){
  const g=COURSES[courseKey].grade;
  const total=COURSES[courseKey].total;
  if(correctFloat>=total && sec<g.sTime)  return{g:'S',color:'grade-S',cond:`全問正解 かつ ${g.sTime}秒未満`};
  if(correctFloat>=total && sec<=g.aTime) return{g:'A',color:'grade-A',cond:`全問正解 かつ ${g.aTime}秒以内`};
  if(correctFloat>=g.bCorrect && sec<=g.bTime) return{g:'B',color:'grade-B',cond:`${g.bCorrect}問以上正解 かつ ${g.bTime}秒以内`};
  if(correctFloat>=g.cCorrect && sec<=g.cTime) return{g:'C',color:'grade-C',cond:`${g.cCorrect}問以上正解 かつ ${g.cTime}秒以内`};
  return{g:'D',color:'grade-D',cond:'次回またチャレンジ！'};
}

// ── 状態 ──────────────────────────────────────
let questions=[],idx=0,correct=0,wrongs=[];
let timerID=null,t0=0,totalSec=0;
let answered=false,inputStr='';
let sekibanUsed=false,totalSekibanPenalty=0;
let shintennoBeaten=[];
let playerName='',startDate=null;
let currentCourse=null; // '10'|'30'|'100'

// ── UI：名前・コース選択 ──────────────────────
function checkReady(){
  const hasName=document.getElementById('name-input').value.trim()!=='';
  const hasCourse=currentCourse!==null;
  const btn=document.getElementById('start-btn');
  btn.disabled=!(hasName&&hasCourse);
  if(!hasName&&!hasCourse) btn.textContent='名前とコースを選んでください';
  else if(!hasName)        btn.textContent='名前を入力してください';
  else if(!hasCourse)      btn.textContent='コースを選んでください';
  else                     btn.textContent='はじめる →';
}

function selectCourse(btn){
  document.querySelectorAll('.course-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  currentCourse=btn.dataset.course;
  // コース説明更新
  const c=COURSES[currentCourse];
  const infoEl=document.getElementById('course-info');
  const tagsEl=document.getElementById('course-info-tags');
  document.getElementById('course-info-title').textContent=`出題構成（全${c.total}問）`;
  tagsEl.innerHTML=c.infoTags.map(t=>`<span class="tag ${t.cls}">${t.txt}</span>`).join('');
  infoEl.style.display='block';
  checkReady();
}

// ── スタート ──────────────────────────────────
function startDrill(){
  playerName=document.getElementById('name-input').value.trim();
  startDate=new Date();
  questions=buildQuestions(currentCourse);
  idx=0;correct=0;wrongs=[];answered=false;inputStr='';
  sekibanUsed=false;totalSekibanPenalty=0;shintennoBeaten=[];
  buildSekibanList();
  showScreen('drill');
  showQ(0);
  updateScore();
  t0=Date.now();
  timerID=setInterval(()=>{
    document.getElementById('timer').textContent=((Date.now()-t0)/1000).toFixed(1);
  },100);
}

// ── 問題表示 ──────────────────────────────────
function showQ(i){
  const q=questions[i];
  sekibanUsed=false;
  const body=document.body;
  const banner=document.getElementById('boss-banner');
  const sekiBtn=document.getElementById('sekiban-btn');
  body.classList.remove('boss-mode','shintenno-mode');
  banner.className=''; sekiBtn.classList.remove('visible');

  if(q.type==='shintenno'){
    body.classList.add('shintenno-mode');
    banner.className='shintenno';
    banner.textContent='👑 四天王降臨！ ～ LEGENDARY BOSS ～';
    sekiBtn.classList.add('visible');
    showBossIntro('shintenno',`👑 ${q.a}の二乗`,'四天王が降臨した…！');
  } else if(q.type==='boss'){
    body.classList.add('boss-mode');
    banner.className='boss';
    banner.textContent='⚔️ BOSS APPEARED! — 平方数との戦い —';
    sekiBtn.classList.add('visible');
    showBossIntro('boss',`⚔️ BOSS`,`${q.a}の二乗が現れた！`);
  }

  const total=COURSES[currentCourse].total;
  document.getElementById('q-label').textContent=`QUESTION ${i+1}`;
  const qaEl=document.getElementById('qa');
  const qbEl=document.getElementById('qb');
  qaEl.textContent=q.a;
  qbEl.textContent=q.b;
  // 2桁の数字はフォントを小さく（自動ズーム防止）
  const twoDigit=q.a>=10||q.b>=10;
  qaEl.classList.toggle('two-digit',twoDigit);
  qbEl.classList.toggle('two-digit',twoDigit);
  document.getElementById('prog').style.width=`${(i/total)*100}%`;
  document.getElementById('prog-text').textContent=`${i+1} / ${total}`;
  document.getElementById('ans-box').textContent='?';
  document.getElementById('ans-box').className='answer-box';
  document.getElementById('fb').textContent='';
  document.getElementById('fb').className='feedback';
  document.getElementById('ok-btn').disabled=false;
  answered=false;inputStr='';
}

function showBossIntro(type,text,sub){
  const intro=document.getElementById('boss-intro');
  document.getElementById('boss-intro-text').textContent=text;
  document.getElementById('boss-intro-text').className=`boss-intro-text ${type}`;
  document.getElementById('boss-intro-sub').textContent=sub;
  intro.classList.add('show');
  setTimeout(()=>intro.classList.remove('show'),1800);
}

// ── テンキー ──────────────────────────────────
function padPress(n){
  if(answered) return;
  if(inputStr.length>=3) return;
  inputStr+=String(n);updateAnsBox();
}
function padDel(){
  if(answered) return;
  inputStr=inputStr.slice(0,-1);updateAnsBox();
}
function updateAnsBox(){
  const box=document.getElementById('ans-box');
  if(inputStr===''){box.textContent='?';box.className='answer-box';}
  else{box.textContent=inputStr;box.className='answer-box has';}
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('drill').classList.contains('active')){
    if(e.key>='0'&&e.key<='9') padPress(Number(e.key));
    else if(e.key==='Backspace') padDel();
    else if(e.key==='Enter') submitAnswer();
  }
});

// ── 答え合わせ ────────────────────────────────
function updateScore(){
  const el=document.getElementById('score');
  el.textContent=`○ ${Math.floor(correct)}`;
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
}

function submitAnswer(){
  if(answered) return;
  if(inputStr===''){setFB('答えを入力してください','ng');return;}
  const userAns=parseInt(inputStr,10);
  const q=questions[idx];
  const ans=q.a*q.b;
  answered=true;
  document.getElementById('ok-btn').disabled=true;
  const box=document.getElementById('ans-box');
  if(userAns===ans){
    if(sekibanUsed){totalSekibanPenalty+=0.5;correct+=0.5;}
    else{correct+=1;}
    box.className='answer-box ok';
    setFB(sekibanUsed?'✓ 正解！（石板ペナルティ）':'✓ 正解！','ok');
    updateScore();
    if(q.type==='shintenno'){
      shintennoBeaten.push(q.a);
      fireConfetti();
      showTitlePopup(getTitleName(q.a));
    }
    setTimeout(nextQ,sekibanUsed?1200:800);
  } else {
    wrongs.push({q:`${q.a}×${q.b}`,ans,user:userAns,type:q.type});
    box.className='answer-box ng';box.classList.add('shake');
    setFB(`✗ 正解は ${ans}`,'ng');
    setTimeout(nextQ,1500);
  }
}

function skipQ(){
  if(answered) return;
  const q=questions[idx];
  wrongs.push({q:`${q.a}×${q.b}`,ans:q.a*q.b,user:'－',type:q.type});
  nextQ();
}

function nextQ(){
  idx++;
  const total=COURSES[currentCourse].total;
  if(idx>=total){
    clearInterval(timerID);
    totalSec=(Date.now()-t0)/1000;
    document.body.classList.remove('boss-mode','shintenno-mode');
    showResults();
  } else { showQ(idx); }
}

function setFB(msg,cls){
  const el=document.getElementById('fb');
  el.textContent=msg;el.className=`feedback ${cls}`;
}

// ── 称号 ──────────────────────────────────────
function getTitleName(latestN){
  const beaten=shintennoBeaten;
  if(currentCourse==='100'){
    if(beaten.length>=4) return '👑 平方数の覇王';
    if(beaten.length>=3) return '⚔️ 伝説の戦士';
  }
  // 最後に撃破した四天王の称号
  const n=latestN||beaten[beaten.length-1];
  if(!n) return null;
  if(n===19) return '🔮 19の秘術士';
  if(n===18) return '🌟 18の剣聖';
  if(n===17) return '💫 17の魔道師';
  if(n===16) return '✨ 16の覚醒者';
  return '👑 四天王撃破';
}

function showTitlePopup(title){
  if(!title) return;
  document.getElementById('title-popup-text').textContent=title;
  const popup=document.getElementById('title-popup');
  popup.classList.add('show');
  setTimeout(()=>popup.classList.remove('show'),2200);
}

// ── 石板 ──────────────────────────────────────
function buildSekibanList(){
  const list=document.getElementById('sekiban-list');
  list.innerHTML='';
  SQUARE_HINTS.forEach(h=>{
    const item=document.createElement('div');
    item.className='sekiban-item';
    item.innerHTML=`<div class="sq-base">${h.base}²</div><div class="sq-ans">${h.ans}</div>`;
    list.appendChild(item);
  });
}
function showSekiban(){
  if(answered) return;
  sekibanUsed=true;
  document.getElementById('sekiban-overlay').classList.add('show');
  setTimeout(closeSekiban,5000);
}
function closeSekiban(){ document.getElementById('sekiban-overlay').classList.remove('show'); }

// ── 紙吹雪 ────────────────────────────────────
function fireConfetti(){
  const colors=['#aa44ff','#ff2255','#ffcc00','#44ffaa','#ff6600','#00aaff'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(8+Math.random()*8)+'px';
    el.style.height=(8+Math.random()*8)+'px';
    el.style.animationDuration=(1.5+Math.random()*1.5)+'s';
    el.style.animationDelay=(Math.random()*0.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

// ── リタイア ──────────────────────────────────
function confirmRetire(){ document.getElementById('retire-overlay').classList.add('show'); }
function closeRetire()  { document.getElementById('retire-overlay').classList.remove('show'); }
function doRetire(){
  clearInterval(timerID);
  document.body.classList.remove('boss-mode','shintenno-mode');
  document.getElementById('retire-overlay').classList.remove('show');
  document.getElementById('boss-intro').classList.remove('show');
  showScreen('start');
}

// ── リザルト ──────────────────────────────────
function showResults(){
  showScreen('result');
  const total=COURSES[currentCourse].total;

  // グレード
  const grade=calcGrade(correct,totalSec,currentCourse);
  const badge=document.getElementById('grade-badge');
  badge.textContent=grade.g;
  badge.className=`grade-badge ${grade.color}`;
  document.getElementById('grade-cond').textContent=grade.cond;

  // スタンプ
  const now=new Date();
  document.getElementById('stamp-name').textContent=playerName||'—';
  document.getElementById('stamp-meta').textContent=
    `${COURSES[currentCourse].label}　${formatDateTime(now)}`;

  // 称号
  const title=getTitleName();
  const tc=document.getElementById('title-card');
  if(title&&shintennoBeaten.length>0){
    document.getElementById('title-name-result').textContent=title;
    tc.classList.add('show');
  } else { tc.classList.remove('show'); }

  // スコア
  const disp=Math.floor(correct);
  document.getElementById('r-correct').innerHTML=`${disp}<span class="res-unit">/ ${total}</span>`;
  document.getElementById('r-time').innerHTML=`${totalSec.toFixed(1)}<span class="res-unit">秒</span>`;
  document.getElementById('r-rate').innerHTML=`${Math.round(disp/total*100)}<span class="res-unit">%</span>`;
  document.getElementById('r-avg').innerHTML=`${(totalSec/total).toFixed(1)}<span class="res-unit">秒</span>`;

  // 100問で四天王全撃破 or 全問正解で紙吹雪
  if(shintennoBeaten.length>=4||(currentCourse!=='100'&&shintennoBeaten.length>0)) setTimeout(fireConfetti,400);

  const wl=document.getElementById('wrong-list');
  const wt=document.getElementById('wrong-title');
  wl.innerHTML='';
  if(wrongs.length){
    wt.textContent=`間違えた問題（${wrongs.length}問）`;
    wl.style.display='flex';
    wrongs.forEach(w=>{
      const el=document.createElement('div');
      el.className='wrong-item';
      el.textContent=`${w.q}＝${w.ans}`;
      if(w.type==='shintenno') el.style.borderColor='rgba(170,68,255,0.5)';
      else if(w.type==='boss') el.style.borderColor='rgba(255,34,85,0.5)';
      wl.appendChild(el);
    });
  } else {
    wt.textContent='全問正解！🎉';
    wl.style.display='none';
    fireConfetti();
  }
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
